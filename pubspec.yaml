name: smart_nutrition
description: "Smart Nutrition Calculator with AI Food Scanner"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_snake_navigationbar: ^0.6.1

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management - Cubit/Bloc
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # AI - Google Gemini
  google_generative_ai: ^0.4.6

  # Camera & Images
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # HTTP Requests
  http: ^1.2.2
  dio: ^5.4.0

  # Charts
  fl_chart: ^0.69.0

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.0.0

  # Animated Snackbars
  top_snackbar_flutter: ^3.1.0

  # Path Provider
  path_provider: ^2.1.4

  # Permissions
  permission_handler: ^12.0.1

  carousel_slider: ^4.2.1          # للـ Carousel
  hive_flutter: ^1.1.0
  
  # PDF Generation with Arabic support
  pdf: ^3.10.7
  printing: ^5.11.0
  
  # PDF Viewer - using native Android support
  webview_flutter: ^4.4.2
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_app.jpeg
    - assets/images/فواكهه.png
    - assets/images/سلطات.png
    - assets/images/لحوم.png
    - assets/images/البان.png
    - assets/images/حبوب.png
    - assets/images/سلطه.png


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_app.jpeg"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/images/icon_app.jpeg"
